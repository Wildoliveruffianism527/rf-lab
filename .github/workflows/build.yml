name: Build FAP

on:
  push:
    branches: [main, develop]
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build with ufbt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install ufbt
        run: pip install --user ufbt

      - name: Bootstrap SDK
        run: ~/.local/bin/ufbt update --channel=dev

      - name: Build FAP
        run: ~/.local/bin/ufbt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingequa_rf_toolkit-fap
          path: dist/pingequa_rf_toolkit.fap
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pingequa_rf_toolkit.fap
